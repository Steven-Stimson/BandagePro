name: build-snapshots

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*"
    branches: [ dev, 'BandagePro*' ]

env:
  BUILD_TYPE: Release
  QT_QPA_PLATFORM: offscreen
  XDG_RUNTIME_DIR: '/tmp/runtime-runner'
  QT_VERSION: 6.7.3

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    name: '🐧 Ubuntu 24.04'

    steps:
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3

      - name: '🧰 Checkout'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: '⚙️ Grab cmake & ninja'
        uses: lukka/get-cmake@latest

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache
          version: ${{env.QT_VERSION}}

      - name: '⚙️ Install dependencies'
        run: sudo apt-get install -y appstream libxcb-cursor0

      - name: '⚙️ Configure CMake'
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_INSTALL_PREFIX=/usr -G Ninja

      - name: '🚧 Build'
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: '⚙️ Make AppDir'
        working-directory: ${{github.workspace}}/build
        run: DESTDIR=AppDir cmake --install ${{github.workspace}}/build

      - name: '⚙️ Install Linuxdeploy'
        working-directory: ${{github.workspace}}/build
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: '📦 Make AppImage'
        working-directory: ${{github.workspace}}/build
        run: |
          export EXTRA_PLATFORM_PLUGINS="libqoffscreen.so;libqminimal.so"

          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          mv BandagePro++*.AppImage BandageProPP-Linux-${{steps.commit.outputs.short}}.AppImage
        shell: bash

      - name: '📤 Upload artifact: AppImage'
        uses: actions/upload-artifact@v4
        with:
          name: BandageProPP-Linux-${{steps.commit.outputs.short}}.AppImage
          path: ${{github.workspace}}/build/BandagePro++*.AppImage

  build-mac:
    runs-on: macos-latest
    name: '🍎 macOS'
    steps:
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3

      - name: '🧰 Checkout'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: '⚙️ Grab cmake & ninja'
        uses: lukka/get-cmake@latest

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache
          version: ${{env.QT_VERSION}}

      - name: '⚙️ Configure CMake'
        # Build arm64 only: the Qt 6.7.3 x86_64 slice links the deprecated AGL
        # framework, which is not present on macOS 26 / Xcode 26 runners. AGL is
        # also stripped from the link line in CMakeLists.txt so the arm64 build
        # can link successfully.
        run:  cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_OSX_ARCHITECTURES="arm64" -DCMAKE_INSTALL_PREFIX=/usr -G Ninja

      - name: '🚧 Build'
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: '📦 Make DMG'
        working-directory: ${{github.workspace}}/build
        run: |
          macdeployqt BandagePro++.app -dmg
          mv *.dmg BandageProPP-macOS-${{steps.commit.outputs.short}}.dmg

      - name: '📤 Upload artifact: DMG'
        uses: actions/upload-artifact@v4
        with:
          name: BandageProPP-macOS-${{steps.commit.outputs.short}}.dmg
          path: ${{github.workspace}}/build/BandagePro++*.dmg

  build-windows:
    runs-on: windows-latest
    name: '🧊 Windows'
    steps:
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3

      - name: '🧰 Checkout'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: '⚙️ Grab cmake & ninja'
        uses: lukka/get-cmake@latest

      - name: '⚙️ Configure MSVC'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache
          version: ${{env.QT_VERSION}}

      - name: '⚙️ Configure CMake'
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_INSTALL_PREFIX=/usr -G Ninja

      - name: '🚧 Build'
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: '📦 Make package'
        working-directory: ${{github.workspace}}/build
        run: |
          mkdir BandageProPP
          cp BandagePro++.exe BandageProPP/
          windeployqt BandageProPP --release --compiler-runtime
          7z a BandageProPP-win-${{steps.commit.outputs.short}}.zip BandageProPP -r

      - name: '📤 Upload artifact: ZIP'
        uses: actions/upload-artifact@v4
        with:
          name: BandageProPP-win-${{steps.commit.outputs.short}}.zip
          path: ${{github.workspace}}/build/BandageProPP*.zip

  # Upload continuous build
  upload:
      name: '🗂 Create release and upload artifacts'
      needs:
        - build-linux
        - build-mac
        - build-windows
      runs-on: ubuntu-24.04
      permissions:
        contents: write # For release uploads
      steps:
      - name: '⚙️ Install dependencies'
        run: sudo apt-get install -y libfuse2
      - name: '📥 Download artifacts'
        uses: actions/download-artifact@v4
      - name: '🗂 Inspect directory after downloading artifacts'
        run: ls -alFR
      - name: '🚀 Create release and upload artifacts'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            wget -q https://github.com/TheAssassin/pyuploadtool/releases/download/continuous/pyuploadtool-x86_64.AppImage
            chmod +x pyuploadtool-x86_64.AppImage
            ./pyuploadtool-x86_64.AppImage **/BandageProPP-Linux-*.AppImage
            ./pyuploadtool-x86_64.AppImage **/BandageProPP-macOS-*.dmg
            ./pyuploadtool-x86_64.AppImage **/BandageProPP-win-*.zip
