name: Build Bandage

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt5-default qtbase5-dev libqt5svg5-dev build-essential

    - name: Build Bandage
      run: |
        qmake Bandage.pro
        make -j$(nproc)

    - name: Package Linux build
      run: |
        mkdir -p Bandage-Linux
        cp Bandage Bandage-Linux/
        cp build_scripts/sample_LastGraph Bandage-Linux/ || true
        chmod +x Bandage-Linux/Bandage
        tar czf Bandage-Linux-x86_64.tar.gz Bandage-Linux/

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bandage-Linux
        path: Bandage-Linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-13
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      run: |
        brew install qt@5
        echo "/usr/local/opt/qt@5/bin" >> $GITHUB_PATH

    - name: Build Bandage
      run: |
        /usr/local/opt/qt@5/bin/qmake Bandage.pro
        make -j$(sysctl -n hw.ncpu)

    - name: Create macOS app bundle
      run: |
        mkdir -p Bandage.app/Contents/MacOS
        mkdir -p Bandage.app/Contents/Resources
        cp Bandage Bandage.app/Contents/MacOS/
        cp images/application.icns Bandage.app/Contents/Resources/ || true

        cat > Bandage.app/Contents/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Bandage</string>
            <key>CFBundleIconFile</key>
            <string>application.icns</string>
            <key>CFBundleIdentifier</key>
            <string>com.bandage.Bandage</string>
            <key>CFBundleName</key>
            <string>Bandage</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.9.0</string>
        </dict>
        </plist>
        EOF

    - name: Package macOS build
      run: |
        if command -v /usr/local/opt/qt@5/bin/macdeployqt &> /dev/null; then
          /usr/local/opt/qt@5/bin/macdeployqt Bandage.app -dmg || true
        fi
        if [ -f Bandage.dmg ]; then
          mv Bandage.dmg Bandage-macOS.dmg
        else
          # Fallback: create a simple tar.gz
          tar czf Bandage-macOS.tar.gz Bandage.app/
          mv Bandage-macOS.tar.gz Bandage-macOS.dmg
        fi

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bandage-macOS
        path: Bandage-macOS.dmg

  build-windows:
    runs-on: windows-2019
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      run: |
        choco install qt5-default -y
        echo "C:\Qt\5.15.2\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build Bandage
      shell: cmd
      run: |
        qmake Bandage.pro
        nmake

    - name: Package Windows build
      shell: bash
      run: |
        mkdir -p Bandage-Windows
        if [ -f release/Bandage.exe ]; then
          cp release/Bandage.exe Bandage-Windows/
        elif [ -f Bandage.exe ]; then
          cp Bandage.exe Bandage-Windows/
        fi
        cp build_scripts/sample_LastGraph Bandage-Windows/ || true

        # Copy Qt DLLs manually
        QTDIR="C:/Qt/5.15.2/msvc2019_64"
        if [ -d "$QTDIR" ]; then
          cp "$QTDIR/bin/Qt5Core.dll" Bandage-Windows/ || true
          cp "$QTDIR/bin/Qt5Gui.dll" Bandage-Windows/ || true
          cp "$QTDIR/bin/Qt5Widgets.dll" Bandage-Windows/ || true
          cp "$QTDIR/bin/Qt5Svg.dll" Bandage-Windows/ || true
        fi

        cd Bandage-Windows
        7z a ../Bandage-Windows-x86_64.zip *

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bandage-Windows
        path: Bandage-Windows-x86_64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Bandage-Linux/Bandage-Linux-x86_64.tar.gz
          Bandage-macOS/Bandage-macOS.dmg
          Bandage-Windows/Bandage-Windows-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
