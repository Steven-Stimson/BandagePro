name: Build Bandage

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        modules: 'qtsvg'

    - name: Build Bandage
      run: |
        qmake Bandage.pro
        make -j$(nproc)

    - name: Package Linux build
      run: |
        mkdir -p Bandage-Linux
        cp Bandage Bandage-Linux/
        cp build_scripts/sample_LastGraph Bandage-Linux/
        chmod +x Bandage-Linux/Bandage
        tar czf Bandage-Linux-x86_64.tar.gz Bandage-Linux/

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bandage-Linux
        path: Bandage-Linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'mac'
        target: 'desktop'
        modules: 'qtsvg'

    - name: Build Bandage
      run: |
        qmake Bandage.pro
        make -j$(sysctl -n hw.ncpu)

    - name: Create macOS app bundle
      run: |
        mkdir -p Bandage.app/Contents/MacOS
        mkdir -p Bandage.app/Contents/Resources
        cp Bandage Bandage.app/Contents/MacOS/
        cp images/application.icns Bandage.app/Contents/Resources/ || true

        cat > Bandage.app/Contents/Info.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Bandage</string>
            <key>CFBundleIconFile</key>
            <string>application.icns</string>
            <key>CFBundleIdentifier</key>
            <string>com.bandage.Bandage</string>
            <key>CFBundleName</key>
            <string>Bandage</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.9.0</string>
        </dict>
        </plist>
        EOF

        macdeployqt Bandage.app -dmg

    - name: Package macOS build
      run: |
        if [ -f Bandage.dmg ]; then
          mv Bandage.dmg Bandage-macOS.dmg
        else
          mkdir -p Bandage-macOS
          cp -r Bandage.app Bandage-macOS/
          cp build_scripts/sample_LastGraph Bandage-macOS/
          hdiutil create -volname Bandage -srcfolder Bandage-macOS -ov -format UDZO Bandage-macOS.dmg
        fi

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bandage-macOS
        path: Bandage-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtsvg'

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.1

    - name: Build Bandage
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        qmake Bandage.pro
        nmake

    - name: Package Windows build
      shell: bash
      run: |
        mkdir -p Bandage-Windows
        cp release/Bandage.exe Bandage-Windows/ || cp Bandage.exe Bandage-Windows/
        cp build_scripts/sample_LastGraph Bandage-Windows/
        windeployqt Bandage-Windows/Bandage.exe

    - name: Create Windows installer (optional)
      shell: bash
      run: |
        cd Bandage-Windows
        7z a ../Bandage-Windows-x86_64.zip *

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bandage-Windows
        path: Bandage-Windows-x86_64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Bandage-Linux/Bandage-Linux-x86_64.tar.gz
          Bandage-macOS/Bandage-macOS.dmg
          Bandage-Windows/Bandage-Windows-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
