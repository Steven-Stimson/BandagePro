name: Build BandagePro

on:
  push:
    branches: [ main, master, develop, BandagePro ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop, BandagePro ]
  workflow_dispatch:

env:
  QT_VERSION: 5.15.2
  QT_QPA_PLATFORM: offscreen
  XDG_RUNTIME_DIR: '/tmp/runtime-runner'

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    name: '🐧 Ubuntu 24.04'
    steps:
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3

      - name: '🧰 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Install Qt and dependencies'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache

      - name: '⚙️ Install AppImage dependencies'
        run: sudo apt-get install -y appstream libxcb-cursor0 imagemagick

      - name: '🚧 Build BandagePro'
        run: |
          qmake BandagePro.pro
          make -j$(nproc)

      - name: '📦 Create AppImage'
        working-directory: ${{github.workspace}}
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp BandagePro AppDir/usr/bin/
          cp build_scripts/sample_LastGraph AppDir/usr/bin/ || true

          # linuxdeploy requires the icon size to match the hicolor directory
          convert images/icon.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/bandagepro.png

          cat > AppDir/usr/share/applications/bandagepro.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=BandagePro
          Exec=BandagePro %F
          Icon=bandagepro
          Comment=Bandage Pro - assembly graph visualisation
          Categories=Science;Biology;
          Terminal=false
          EOF

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/bandagepro.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/bandagepro.png \
            --plugin qt \
            --output appimage

          mv BandagePro-x86_64.AppImage BandagePro-Linux-${{steps.commit.outputs.short}}.AppImage

      - name: '📤 Upload Linux artifact'
        uses: actions/upload-artifact@v4
        with:
          name: BandagePro-Linux-${{steps.commit.outputs.short}}.AppImage
          path: BandagePro-Linux-${{steps.commit.outputs.short}}.AppImage

  build-macos:
    runs-on: macos-latest
    name: '🍎 macOS'
    steps:
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3

      - name: '🧰 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache

      - name: '🚧 Build BandagePro'
        run: |
          qmake BandagePro.pro
          make -j$(sysctl -n hw.ncpu)

      - name: '📦 Create macOS app bundle'
        run: |
          # qmake already created BandagePro.app; update its Info.plist
          cp images/application.icns BandagePro.app/Contents/Resources/ || true

          cat > BandagePro.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>BandagePro</string>
              <key>CFBundleIconFile</key>
              <string>application.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.bandagepro.BandagePro</string>
              <key>CFBundleName</key>
              <string>BandagePro</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>0.9.0</string>
          </dict>
          </plist>
          EOF

      - name: '📦 Package macOS build'
        run: |
          macdeployqt BandagePro.app -dmg || true
          if [ -f BandagePro.dmg ]; then
            mv BandagePro.dmg BandagePro-macOS-${{steps.commit.outputs.short}}.dmg
          else
            tar czf BandagePro-macOS-${{steps.commit.outputs.short}}.tar.gz BandagePro.app/
            mv BandagePro-macOS-${{steps.commit.outputs.short}}.tar.gz BandagePro-macOS-${{steps.commit.outputs.short}}.dmg
          fi

      - name: '📤 Upload macOS artifact'
        uses: actions/upload-artifact@v4
        with:
          name: BandagePro-macOS-${{steps.commit.outputs.short}}.dmg
          path: BandagePro-macOS-${{steps.commit.outputs.short}}.dmg

  build-windows:
    runs-on: windows-2022
    name: '🧊 Windows'
    steps:
      - id: commit
        uses: pr-mpt/actions-commit-hash@v3

      - name: '🧰 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache

      - name: '⚙️ Setup MSVC'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.29

      - name: '🚧 Build BandagePro'
        shell: cmd
        run: |
          qmake BandagePro.pro
          nmake

      - name: '📦 Package Windows build'
        shell: bash
        run: |
          mkdir -p BandagePro
          if [ -f release/BandagePro.exe ]; then
            cp release/BandagePro.exe BandagePro/
          elif [ -f BandagePro.exe ]; then
            cp BandagePro.exe BandagePro/
          fi
          cp build_scripts/sample_LastGraph BandagePro/ || true

          if [ -f BandagePro/BandagePro.exe ]; then
            windeployqt BandagePro/BandagePro.exe --release --compiler-runtime
          fi

          7z a BandagePro-win-${{steps.commit.outputs.short}}.zip BandagePro -r

      - name: '📤 Upload Windows artifact'
        uses: actions/upload-artifact@v4
        with:
          name: BandagePro-win-${{steps.commit.outputs.short}}.zip
          path: BandagePro-win-${{steps.commit.outputs.short}}.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: '📥 Download all artifacts'
        uses: actions/download-artifact@v4

      - name: '🚀 Create Release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/BandagePro-Linux-*.AppImage
            **/BandagePro-macOS-*.dmg
            **/BandagePro-win-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
