name: Build BandagePro

on:
  push:
    branches: [ main, master, develop, BandagePro ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop, BandagePro ]
  workflow_dispatch:

env:
  QT_VERSION: 5.15.2
  QT_QPA_PLATFORM: offscreen
  XDG_RUNTIME_DIR: '/tmp/runtime-runner'

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    name: '🐧 Ubuntu 24.04'
    steps:
      - name: '🧰 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtsvg'
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache

      - name: '🚧 Build BandagePro'
        run: |
          qmake BandagePro.pro
          make -j$(nproc)

      - name: '📦 Package Linux build'
        run: |
          mkdir -p BandagePro-Linux
          cp BandagePro BandagePro-Linux/
          cp build_scripts/sample_LastGraph BandagePro-Linux/ || true
          chmod +x BandagePro-Linux/BandagePro
          tar czf BandagePro-Linux-x86_64.tar.gz BandagePro-Linux/

      - name: '📤 Upload Linux artifact'
        uses: actions/upload-artifact@v4
        with:
          name: BandagePro-Linux
          path: BandagePro-Linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    name: '🍎 macOS'
    steps:
      - name: '🧰 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtsvg'
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache

      - name: '🚧 Build BandagePro'
        run: |
          qmake BandagePro.pro
          make -j$(sysctl -n hw.ncpu)

      - name: '📦 Create macOS app bundle'
        run: |
          mkdir -p BandagePro.app/Contents/MacOS
          mkdir -p BandagePro.app/Contents/Resources
          cp BandagePro BandagePro.app/Contents/MacOS/
          cp images/application.icns BandagePro.app/Contents/Resources/ || true

          cat > BandagePro.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>BandagePro</string>
              <key>CFBundleIconFile</key>
              <string>application.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.bandagepro.BandagePro</string>
              <key>CFBundleName</key>
              <string>BandagePro</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>0.9.0</string>
          </dict>
          </plist>
          EOF

      - name: '📦 Package macOS build'
        run: |
          macdeployqt BandagePro.app -dmg || true
          if [ -f BandagePro.dmg ]; then
            mv BandagePro.dmg BandagePro-macOS.dmg
          else
            tar czf BandagePro-macOS.tar.gz BandagePro.app/
            mv BandagePro-macOS.tar.gz BandagePro-macOS.dmg
          fi

      - name: '📤 Upload macOS artifact'
        uses: actions/upload-artifact@v4
        with:
          name: BandagePro-macOS
          path: BandagePro-macOS.dmg

  build-windows:
    runs-on: windows-latest
    name: '🧊 Windows'
    steps:
      - name: '🧰 Checkout'
        uses: actions/checkout@v4

      - name: '⚙️ Install Qt'
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtsvg'
          cache: true
          cache-key-prefix: ${{ runner.os }}-QtCache

      - name: '⚙️ Setup MSVC'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: '🚧 Build BandagePro'
        shell: cmd
        run: |
          qmake BandagePro.pro
          nmake

      - name: '📦 Package Windows build'
        shell: bash
        run: |
          mkdir -p BandagePro-Windows
          if [ -f release/BandagePro.exe ]; then
            cp release/BandagePro.exe BandagePro-Windows/
          elif [ -f BandagePro.exe ]; then
            cp BandagePro.exe BandagePro-Windows/
          fi
          cp build_scripts/sample_LastGraph BandagePro-Windows/ || true

          if [ -f BandagePro-Windows/BandagePro.exe ]; then
            windeployqt BandagePro-Windows/BandagePro.exe --release --compiler-runtime
          fi

          cd BandagePro-Windows
          7z a ../BandagePro-Windows-x86_64.zip *

      - name: '📤 Upload Windows artifact'
        uses: actions/upload-artifact@v4
        with:
          name: BandagePro-Windows
          path: BandagePro-Windows-x86_64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: '📥 Download all artifacts'
        uses: actions/download-artifact@v4

      - name: '🚀 Create Release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            BandagePro-Linux/BandagePro-Linux-x86_64.tar.gz
            BandagePro-macOS/BandagePro-macOS.dmg
            BandagePro-Windows/BandagePro-Windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
